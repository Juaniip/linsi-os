name: Build LINSI OS ISO

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar dependencias de build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            syslinux-utils \
            isolinux \
            lynis

      - name: Configurar live-build
        run: |
          # Ejecutar auto/config explícitamente — contiene --distribution noble y todos los flags
          chmod +x auto/config
          sudo bash auto/config
          # Verificar que noble quedó configurado
          grep "noble" .build/config 2>/dev/null || grep "noble" config/common 2>/dev/null || echo "Verificar config manualmente"

      - name: Build ISO
        run: |
          mkdir -p output
          sudo lb build 2>&1 | tee output/build.log

      - name: Renombrar ISO con versión
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}-${GITHUB_SHA::7}"
          ISO=$(find . -maxdepth 1 -name "*.iso" | head -1)
          if [ -n "$ISO" ]; then
            mv "$ISO" "output/linsi-os-${VERSION}.iso"
            sha256sum "output/linsi-os-${VERSION}.iso" > "output/linsi-os-${VERSION}.iso.sha256"
            echo "ISO_PATH=output/linsi-os-${VERSION}.iso" >> "$GITHUB_ENV"
          fi

      - name: Auditoría de seguridad con Lynis
        run: |
          sudo lynis audit system --no-colors --quiet 2>&1 | tee output/lynis-report.txt
          SCORE=$(grep "Hardening index" output/lynis-report.txt | grep -oP '\d+' | head -1)
          echo "Lynis score: $SCORE"
          if [ -n "$SCORE" ] && [ "$SCORE" -lt 60 ]; then
            echo "::warning::Lynis score ($SCORE) está por debajo del umbral recomendado (60)"
          fi
        continue-on-error: true

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: linsi-os-iso
          path: |
            output/*.iso
            output/*.sha256
            output/build.log
            output/lynis-report.txt
          retention-days: 7
          if-no-files-found: warn

      - name: Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/*.iso
            output/*.sha256
          generate_release_notes: true
