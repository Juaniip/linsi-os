name: Build ISO

on:
  push:
    branches:
      - develop
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build LINSI OS ISO
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat build/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            live-build \
            debootstrap \
            equivs \
            xorriso \
            isolinux \
            syslinux-efi \
            grub-efi-amd64-bin \
            grub-pc-bin \
            mtools \
            dosfstools \
            ca-certificates \
            curl \
            wget \
            gpg \
            apt-utils

      - name: Build ISO
        run: sudo bash build/build.sh
        env:
          LB_MIRROR: http://archive.ubuntu.com/ubuntu/

      - name: Run Lynis security audit
        run: |
          sudo apt-get install -y lynis
          # Run Lynis against the chroot if it exists post-build
          # For now, audit the runner as a baseline check
          sudo lynis audit system --quiet --no-colors 2>&1 | tail -20 || true

      - name: Verify ISO checksum
        run: |
          ISO="output/linsi-os-${{ steps.version.outputs.version }}.iso"
          if [[ ! -f "${ISO}" ]]; then
            echo "ERROR: ISO not found at ${ISO}"
            exit 1
          fi
          sha256sum --check "${ISO}.sha256"
          echo "ISO size: $(du -sh ${ISO} | cut -f1)"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: linsi-os-${{ steps.version.outputs.version }}-${{ github.run_number }}
          path: |
            output/*.iso
            output/*.sha256
          retention-days: 7

      # Publish a GitHub Release on version tags
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: LINSI OS ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          files: |
            output/*.iso
            output/*.sha256
          body: |
            ## LINSI OS ${{ steps.version.outputs.version }}

            See [CHANGELOG.md](CHANGELOG.md) for changes in this release.

            ### Verification

            Verify the ISO integrity before use:
            ```
            sha256sum --check linsi-os-${{ steps.version.outputs.version }}.iso.sha256
            ```
